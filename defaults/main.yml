---
#papertrail_destination: "" # shouldn't be here
papertrail_loglevel: "*.*"
papertrail_enable_tcp: false
papertrail_enable_tls: true
# Set hostname to use instead of machine hostname (empty string = use machine hostname)
papertrail_hostname: ""

# Rsyslog Defaults 
papertrail_EscapeControlCharactersOnReceive: 'on'